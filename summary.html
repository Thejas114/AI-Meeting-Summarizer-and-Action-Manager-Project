<!DOCTYPE html>
<html>
<head>
<title>Transcript Summarizer - Ollama</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: #fff;
  margin: 0;
  padding: 20px;
  min-height: 100vh;
}
.container {
  max-width: 900px;
  margin: 0 auto;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 30px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
h2 {margin-top: 0;font-size: 28px;}
.upload-area {
  background: rgba(255,255,255,0.15);
  border: 2px dashed rgba(255,255,255,0.5);
  border-radius: 15px;
  padding: 40px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
  margin: 20px 0;
}
.upload-area:hover {
  background: rgba(255,255,255,0.25);
  border-color: rgba(255,255,255,0.8);
}
input[type="file"] {display: none;}
.settings {
  background: rgba(0,0,0,0.2);
  padding: 20px;
  border-radius: 12px;
  margin: 20px 0;
}
.form-group {margin: 15px 0;}
label {display: block;margin-bottom: 8px;font-weight: 600;font-size: 14px;}
input, select, textarea {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: rgba(255,255,255,0.9);
  color: #333;
  font-size: 14px;
  box-sizing: border-box;
}
button {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  padding: 14px 28px;
  border-radius: 25px;
  border: none;
  cursor: pointer;
  font-size: 16px;
  font-weight: 600;
  margin: 10px 5px;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}
button:hover {transform: translateY(-2px);box-shadow: 0 6px 20px rgba(0,0,0,0.3);}
button:disabled {background: #999;cursor: not-allowed;transform: none;}
.result-area {
  background: rgba(0,0,0,0.3);
  padding: 25px;
  border-radius: 12px;
  margin: 20px 0;
  display: none;
}
.transcript-preview {
  background: rgba(255,255,255,0.1);
  padding: 15px;
  border-radius: 8px;
  max-height: 200px;
  overflow-y: auto;
  font-size: 13px;
  line-height: 1.6;
  margin: 15px 0;
  white-space: pre-wrap;
}
.summary-output {
  background: rgba(255,255,255,0.95);
  color: #333;
  padding: 20px;
  border-radius: 10px;
  line-height: 1.8;
  font-size: 15px;
  white-space: pre-wrap;
  max-height: 500px;
  overflow-y: auto;
}
.status {
  padding: 12px;
  border-radius: 8px;
  margin: 15px 0;
  font-size: 14px;
}
.status.info {background: rgba(59,130,246,0.3);}
.status.success {background: rgba(16,185,129,0.3);}
.status.error {background: rgba(239,68,68,0.3);}
.status.processing {background: rgba(251,191,36,0.3);animation: pulse 1.5s infinite;}
@keyframes pulse {0%,100%{opacity:1}50%{opacity:.7}}
</style>
</head>
<body>

<div class="container">
  <h2>📝 Transcript Summarizer with Ollama</h2>

  <div class="settings">
    <h3>⚙ Ollama Settings</h3>
    <div class="form-group">
      <label>Ollama API URL:</label>
      <input type="text" id="ollamaUrl" value="http://localhost:11434">
    </div>
    <div class="form-group">
      <label>Model:</label>
      <select id="modelSelect">
        <option value="llama3.2">llama3.2</option>
        <option value="llama3.1">llama3.1</option>
        <option value="mistral">mistral</option>
        <option value="qwen2.5">qwen2.5</option>
        <option value="custom">Custom</option>
      </select>
    </div>
    <div class="form-group">
      <input type="text" id="customModel" placeholder="Custom model name (if selected above)">
    </div>
    <button onclick="testConnection()">🔌 Test Connection</button>
    <button onclick="listModels()">📋 List Available Models</button>
  </div>

  <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
    <h3>📄 Drop transcript file or click to upload</h3>
    <input type="file" id="fileInput" accept=".txt" onchange="handleFile(this.files[0])">
  </div>

  <div id="fileInfo" style="display:none;" class="file-info">
    <strong>📁 File loaded:</strong> <span id="fileName"></span>
    <div class="stats">
      <div><strong>Lines:</strong> <span id="lineCount">0</span></div>
      <div><strong>Words:</strong> <span id="wordCount">0</span></div>
      <div><strong>Characters:</strong> <span id="charCount">0</span></div>
    </div>
    <details>
      <summary>👁 Preview Transcript</summary>
      <div class="transcript-preview" id="transcriptPreview"></div>
    </details>
  </div>

  <div id="summarizeOptions" style="display:none;">
    <h3>📋 Summary Options</h3>
    <div class="form-group">
      <label>Summary Type:</label>
      <select id="summaryType" onchange="toggleCustomPrompt()">
        <option value="brief">Brief Summary</option>
        <option value="detailed">Detailed Summary</option>
        <option value="bullet">Bullet Points</option>
        <option value="action">Action Items</option>
        <option value="qa">Q&A Format</option>
        <option value="custom">Custom Prompt</option>
      </select>
    </div>
    <div class="form-group" id="customPromptGroup" style="display:none;">
      <label>Custom Instructions:</label>
      <textarea id="customPrompt" rows="3"></textarea>
    </div>
    <button onclick="generateSummary()">✨ Generate Summary</button>
  </div>

  <div id="status"></div>

  <div class="result-area" id="resultArea">
    <h3>📊 Summary Result</h3>
    <div class="summary-output" id="summaryOutput"></div>
    <button onclick="copySummary()">📋 Copy</button>
    <button onclick="downloadSummary()">💾 Download</button>
  </div>
</div>

<script>
let transcriptContent = '';
let currentFileName = '';

function showStatus(message, type) {
  const s = document.getElementById('status');
  s.textContent = message;
  s.className = 'status ' + type;
  s.style.display = 'block';
  s.style.whiteSpace = 'pre-line';
}

async function testConnection() {
  const url = document.getElementById('ollamaUrl').value.trim();
  showStatus('Testing connection...', 'processing');
  try {
    const res = await fetch(`${url}/api/tags`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    showStatus(`✅ Connected! Found ${data.models?.length || 0} model(s).`, 'success');
  } catch (err) {
    showStatus(`❌ Connection failed: ${err.message}`, 'error');
  }
}

async function listModels() {
  const url = document.getElementById('ollamaUrl').value.trim();
  showStatus('Fetching models...', 'processing');
  try {
    const res = await fetch(`${url}/api/tags`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const models = data.models?.map(m => `• ${m.name} (${(m.size/1e9).toFixed(1)}GB)`).join('\n');
    showStatus(models ? `✅ Available models:\n${models}` : '⚠ No models found', 'success');
  } catch (err) {
    showStatus(`❌ Error fetching models: ${err.message}`, 'error');
  }
}

function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    transcriptContent = e.target.result;
    const words = transcriptContent.split(/\s+/).filter(Boolean).length;
    document.getElementById('fileName').textContent = file.name;
    document.getElementById('wordCount').textContent = words;
    document.getElementById('lineCount').textContent = transcriptContent.split('\n').length;
    document.getElementById('charCount').textContent = transcriptContent.length;
    document.getElementById('transcriptPreview').textContent = transcriptContent.slice(0, 1000);
    document.getElementById('fileInfo').style.display = 'block';
    document.getElementById('summarizeOptions').style.display = 'block';
    showStatus(`✅ File loaded (${words} words)`, 'success');
    currentFileName = file.name;
  };
  reader.readAsText(file);
}

function toggleCustomPrompt() {
  const type = document.getElementById('summaryType').value;
  document.getElementById('customPromptGroup').style.display = type === 'custom' ? 'block' : 'none';
}

function getPromptForType(t){
  const prompts = {
    brief: 'Provide a short 3–5 sentence summary of this transcript.',
    detailed: 'Give a detailed summary of this transcript including main points and conclusions.',
    bullet: 'Summarize the transcript as bullet points highlighting key ideas.',
    action: 'List all action items, tasks, or decisions mentioned in the transcript.',
    qa: 'Summarize as Q&A format (questions and responses).'
  };
  return prompts[t] || '';
}

async function generateSummary() {
  if (!transcriptContent) return showStatus('❌ Please upload a transcript first','error');
  const url = document.getElementById('ollamaUrl').value.trim();
  let model = document.getElementById('modelSelect').value;
  if (model === 'custom') model = document.getElementById('customModel').value.trim();
  if (!model) return showStatus('❌ Please specify a model name.','error');
  const type = document.getElementById('summaryType').value;
  const prompt = type === 'custom' ? document.getElementById('customPrompt').value : getPromptForType(type);
  const fullPrompt = `${prompt}\n\nTranscript:\n${transcriptContent}`;
  showStatus(`🤖 Generating summary with ${model}...`, 'processing');
  try {
    const res = await fetch(`${url}/api/generate`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({model, prompt: fullPrompt, stream:false})
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    document.getElementById('summaryOutput').textContent = data.response || 'No response.';
    document.getElementById('resultArea').style.display='block';
    showStatus('✅ Summary generated!', 'success');
  } catch(e){
    showStatus(`❌ ${e.message}`, 'error');
  }
}

function copySummary(){
  navigator.clipboard.writeText(document.getElementById('summaryOutput').textContent);
  showStatus('✅ Summary copied to clipboard!', 'success');
}

function downloadSummary(){
  const t = new Date().toISOString().replace(/[:.]/g,'-');
  const text = `MEETING SUMMARY\nGenerated: ${new Date().toLocaleString()}\nSource: ${currentFileName}\n${'='.repeat(60)}\n\n${document.getElementById('summaryOutput').textContent}`;
  const blob = new Blob([text], {type:'text/plain'});
  const url = URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`summary-${t}.txt`;
  a.click();
  URL.revokeObjectURL(url);
  showStatus('✅ Summary downloaded!','success');
}
</script>
</body>
</html>
